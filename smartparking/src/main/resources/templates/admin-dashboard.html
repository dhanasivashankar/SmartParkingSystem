<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | ParkEase</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">🚗 ParkEase Admin Panel</span>

        <a href="/logout" class="btn btn-danger">
            Logout
        </a>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4 text-center">Admin Dashboard</h2>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>Total Users</h5>
                    <h2 th:text="${totalUsers}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>Total Bookings</h5>
                    <h2 th:text="${totalBookings}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>Total Slots</h5>
                    <h2 th:text="${totalSlots}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>Available Slots</h5>
                    <h2 th:text="${availableSlots}"></h2>
                </div>
            </div>
        </div>

    </div>

    <hr class="my-5">

    <div class="d-grid gap-3">

        <a href="/admin/users" class="btn btn-primary btn-lg">
            👥 View Users
        </a>

        <a href="/admin/bookings" class="btn btn-success btn-lg">
            📋 View Bookings
        </a>

        <a href="/admin/slots" class="btn btn-warning btn-lg">
            🚗 Manage Parking Slots
        </a>

    </div>

</div>

</body>
</html>
