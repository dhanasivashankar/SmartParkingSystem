<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Manage Parking Slots</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center">

        <h2>Manage Parking Slots</h2>

        <a href="/admin/dashboard"
           class="btn btn-secondary">

            Back

        </a>

    </div>

    <hr>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Slot</th>
            <th>Vehicle</th>
            <th>Status</th>
            <th>Rate</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="slot : ${slots}">

            <td th:text="${slot.slotId}"></td>

            <td th:text="${slot.slotNumber}"></td>

            <td th:text="${slot.vehicleType}"></td>

            <td>

                <span class="badge"
                      th:classappend="${slot.status=='AVAILABLE'} ? 'bg-success' : 'bg-danger'"
                      th:text="${slot.status}">
                </span>

            </td>

            <td>

                ₹<span th:text="${slot.hourlyRate}"></span>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
